providers:
  - provider: iapp # 服务提供商名称, 如 openai、anthropic、gemini、openrouter，随便取名字，必填
    base_url: https://ai.iapp.dpdns.org/v1/chat/completions # 后端服务的API地址，必填
    api: sk-SW0XouHOA6juht9xfNyIHRKCESd6VkiZ # 提供商的API Key，必填
    model: # 选填，如果不配置 model，会自动通过 base_url 和 api 通过 /v1/models 端点获取可用的所有模型。
      - deepseek-v4-flash # 可以使用的模型名称，必填
      - mimo-v2.5
api_keys:
  - api: sk-adx # API Key，用户请求 uni-api 需要 API key，必填
  # 该 API Key 可以使用所有模型，即可以使用 providers 下面设置的所有渠道里面的所有模型，不需要一个个添加可用渠道。
